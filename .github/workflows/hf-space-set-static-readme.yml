# One-click fix: Hub README is still the default `sdk: gradio` so the UI shows the Gradio tutorial
# even when index.html + assets are already in the Space. This workflow uploads
# scripts/hf-space-README.md as README.md with `sdk: static` (see
# https://huggingface.co/docs/hub/spaces-sdks-static ).

name: "Fix HF Space: static README"

on:
  workflow_dispatch:

concurrency:
  group: hf-space-readme
  cancel-in-progress: true

jobs:
  upload-readme:
    name: Upload static README to Hugging Face Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hub client
        run: python -m pip install "huggingface-hub>=0.20"

      - name: Push static Space README
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ACCESS_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
        run: python scripts/upload_space_readme.py